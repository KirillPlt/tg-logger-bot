services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-logger-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-data:/app/data

  prometheus:
    image: prom/prometheus:latest
    container_name: tg-logger-prometheus
    profiles:
      - observability
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.7.0
    container_name: tg-logger-loki
    profiles:
      - observability
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./ops/observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  alloy:
    image: grafana/alloy:v1.15.0
    container_name: tg-logger-alloy
    profiles:
      - observability
    restart: unless-stopped
    depends_on:
      - loki
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "${ALLOY_PORT:-12345}:12345"
    volumes:
      - ./ops/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro

  grafana:
    image: grafana/grafana:latest
    container_name: tg-logger-grafana
    profiles:
      - observability
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./ops/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  bot-data:
  prometheus-data:
  loki-data:
  alloy-data:
  grafana-data:
